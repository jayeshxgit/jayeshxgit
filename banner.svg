<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Jayesh Kapoor - GitHub Profile Banner</title>
  <desc>Animated neon hacker-themed banner for Jayesh Kapoor's GitHub profile</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0a1a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FF41"/>
      <stop offset="50%" style="stop-color:#00FFFF"/>
      <stop offset="100%" style="stop-color:#00FF41"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FF41;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00FF41;stop-opacity:0.6"/>
      <stop offset="70%" style="stop-color:#00FFFF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00FFFF;stop-opacity:0"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="0"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#00FF41" stroke-width="0.3" stroke-opacity="0.12"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#00FF41" stroke-width="0.3" stroke-opacity="0.12"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#00FF41" stroke-width="0.3" stroke-opacity="0.12"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#00FF41" stroke-width="0.3" stroke-opacity="0.12"/>

  <!-- Grid lines vertical -->
  <line x1="100" y1="0" x2="100" y2="200" stroke="#00FF41" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="200" stroke="#00FF41" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="300" y1="0" x2="300" y2="200" stroke="#00FF41" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="200" stroke="#00FF41" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="500" y1="0" x2="500" y2="200" stroke="#00FF41" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="200" stroke="#00FF41" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="700" y1="0" x2="700" y2="200" stroke="#00FF41" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="800" y1="0" x2="800" y2="200" stroke="#00FF41" stroke-width="0.3" stroke-opacity="0.08"/>

  <!-- Animated scan line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#waveGrad1)" opacity="0.7">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 200" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner brackets top-left -->
  <path d="M 20 20 L 20 50 M 20 20 L 55 20" stroke="#00FF41" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Corner brackets top-right -->
  <path d="M 880 20 L 880 50 M 880 20 L 845 20" stroke="#00FF41" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Corner brackets bottom-left -->
  <path d="M 20 180 L 20 150 M 20 180 L 55 180" stroke="#00FFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Corner brackets bottom-right -->
  <path d="M 880 180 L 880 150 M 880 180 L 845 180" stroke="#00FFFF" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Blinking cursor prefix -->
  <text x="72" y="88" font-family="'Courier New', monospace" font-size="20" fill="#00FF41" opacity="0.9">$_</text>
  <rect x="72" y="70" width="14" height="22" fill="#00FF41">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Main name — large, gradient fill -->
  <text
    x="450" y="105"
    font-family="'Courier New', monospace"
    font-size="52"
    font-weight="bold"
    fill="url(#nameGrad)"
    text-anchor="middle"
    filter="url(#glow)"
    letter-spacing="6">JAYESH KAPOOR</text>

  <!-- Animated underline -->
  <rect x="150" y="116" width="0" height="2" fill="#00FF41" rx="1">
    <animate attributeName="width" from="0" to="600" dur="1.5s" begin="0.3s" fill="freeze"/>
    <animate attributeName="x" from="450" to="150" dur="1.5s" begin="0.3s" fill="freeze"/>
  </rect>

  <!-- Tagline -->
  <text
    x="450" y="148"
    font-family="'Courier New', monospace"
    font-size="14"
    fill="#00FFFF"
    text-anchor="middle"
    opacity="0"
    letter-spacing="3">
    FULL STACK · MATH &amp; COMPUTING · DEVOPS · OPEN SOURCE
    <animate attributeName="opacity" from="0" to="0.9" dur="1s" begin="1.5s" fill="freeze"/>
  </text>

  <!-- Bottom status bar -->
  <rect x="0" y="182" width="900" height="18" fill="#00FF41" fill-opacity="0.06"/>
  <text x="24" y="194" font-family="'Courier New', monospace" font-size="10" fill="#00FF41" opacity="0.6">[ CONNECTED ]</text>
  <text x="450" y="194" font-family="'Courier New', monospace" font-size="10" fill="#00FFFF" opacity="0.6" text-anchor="middle">github.com/jayeshxgit</text>
  <text x="876" y="194" font-family="'Courier New', monospace" font-size="10" fill="#00FF41" opacity="0.6" text-anchor="end">[ READY ]</text>

  <!-- Animated dots far left -->
  <circle cx="840" cy="35" r="3" fill="#00FF41">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="855" cy="35" r="3" fill="#00FFFF">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="870" cy="35" r="3" fill="#00FF41">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

</svg>
